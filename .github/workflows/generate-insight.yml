name: Generate Daily Market Insight

on:
  schedule:
    # 한국 시간(UTC+9) 기준 오전 9시, 오후 4시
    # UTC 기준: 00:00 (오전 9시), 07:00 (오후 4시)
    - cron: '0 0,7 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 깃 커밋 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create required directories
        run: mkdir -p content/market-analysis

      - name: Run generation script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-daily-insight.mjs

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/market-analysis/*.mdx
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: 실시간 시장 인사이트 자동 생성 [skip ci]"
            git push
          fi
